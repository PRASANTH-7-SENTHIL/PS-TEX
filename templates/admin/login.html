{% extends 'base.html' %}

{% block title %}Admin Portal Login | PS-TEX{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm p-4 rounded bg-white mt-4" style="border-top: 5px solid var(--color-gold) !important;">
                <div class="text-center mb-4">
                    <h2 class="font-serif text-maroon mb-1"><i class="bi bi-shield-lock"></i> Admin Portal</h2>
                    <p class="text-muted small">Authorized Personnel Only</p>
                    <div class="traditional-divider mb-0" style="margin: 10px 0;"><i class="bi bi-flower1"></i></div>
                </div>
                
                <form action="{{ url_for('admin.login') }}" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">Admin Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope-at-fill"></i></span>
                            <input type="email" class="form-control border-start-0" id="email" name="email" placeholder="admin@ps-tex.com" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Admin Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-key-fill"></i></span>
                            <input type="password" class="form-control border-start-0" id="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-maroon w-100 py-3 font-serif fs-5 mb-2" style="background-color: var(--color-maroon-dark);">
                        Secure Login
                    </button>
                    
                    <div class="text-center text-muted small mt-3">
                        <a href="{{ url_for('main.index') }}" class="text-secondary"><i class="bi bi-arrow-left"></i> Return to Main Site</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
