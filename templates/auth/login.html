{% extends 'base.html' %}

{% block title %}Login | PS-TEX Saree Store{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm p-4 rounded bg-white mt-4">
                <div class="text-center mb-4">
                    <h2 class="font-serif text-maroon mb-1">Welcome Back</h2>
                    <p class="text-muted small">Sign in to your PS-TEX account</p>
                    <div class="traditional-divider mb-0" style="margin: 10px 0;"><i class="bi bi-flower1"></i></div>
                </div>
                
                <form action="{{ url_for('auth.login', next=request.args.get('next', '')) }}" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">Email address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control border-start-0" id="email" name="email" placeholder="name@example.com" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold mb-1">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control border-start-0 border-end-0" id="password" name="password" placeholder="••••••••" required>
                            <span class="input-group-text bg-white border-start-0" id="togglePassword" style="cursor: pointer;">
                                <i class="bi bi-eye" id="toggleIcon"></i>
                            </span>
                        </div>
                    </div>
                    
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label text-muted small" for="remember">Remember me for 30 days</label>
                    </div>
                    
                    <button type="submit" class="btn btn-maroon w-100 py-3 font-serif fs-5 mb-3">Sign In</button>
                    
                    <div class="text-center text-muted small mt-3">
                        Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-maroon fw-semibold">Register Here</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');
    const toggleIcon = document.querySelector('#toggleIcon');

    if (togglePassword && password && toggleIcon) {
        togglePassword.addEventListener('click', function() {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            toggleIcon.classList.toggle('bi-eye');
            toggleIcon.classList.toggle('bi-eye-slash');
        });
    }
});
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDpGbEWS0eVvrYng9g53w5RXfvWu6rXHWg",
      authDomain: "mousika-tex-7221d.firebaseapp.com",
      projectId: "mousika-tex-7221d",
      storageBucket: "mousika-tex-7221d.firebasestorage.app",
      messagingSenderId: "1055917155428",
      appId: "1:1055917155428:web:4bb3ba67a5a027c91f6b71",
      measurementId: "G-9GVLDM6E72"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginForm = document.querySelector('form');
    const emailInput = document.querySelector('#email');
    const passwordInput = document.querySelector('#password');
    const submitBtn = document.querySelector('button[type="submit"]');

    let errorAlert = document.querySelector('#firebase-error-alert');
    if (!errorAlert) {
        errorAlert = document.createElement('div');
        errorAlert.id = 'firebase-error-alert';
        errorAlert.className = 'alert alert-danger d-none mt-3';
        loginForm.insertBefore(errorAlert, loginForm.firstChild);
    }

    loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Clear previous errors
        errorAlert.classList.add('d-none');
        errorAlert.textContent = '';
        
        // Disable button and show loader
        const originalBtnText = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Signing in...';

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        try {
            // Sign in with Firebase
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;
            
            // Get ID token
            const idToken = await user.getIdToken();
            
            // Inject hidden firebase_id_token input
            let tokenInput = document.querySelector('input[name="firebase_id_token"]');
            if (!tokenInput) {
                tokenInput = document.createElement('input');
                tokenInput.type = 'hidden';
                tokenInput.name = 'firebase_id_token';
                loginForm.appendChild(tokenInput);
            }
            tokenInput.value = idToken;
            
            // Submit the form to Flask
            loginForm.submit();
        } catch (error) {
            console.error("Firebase Login Error:", error);
            
            // Enable button
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalBtnText;
            
            // Map errors to user friendly messages
            let message = 'Invalid email or password. Please try again.';
            if (error.code === 'auth/invalid-email') {
                message = 'Invalid email address format.';
            } else if (error.code === 'auth/user-disabled') {
                message = 'This user account has been disabled.';
            } else if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                message = 'Invalid email or password.';
            }
            
            errorAlert.textContent = message;
            errorAlert.classList.remove('d-none');
        }
    });
</script>
{% endblock %}
